<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#d8f0e4">
  <title>404 · 小维找不到这里</title>
  <link rel="icon" href="https://web-static.kurobbs.com/resource/prod/icon.ico" type="image/x-icon">
  <style>
    /* === 核心配色变量 === */
    :root {
      --verina-mint: #66cdaa;
      --verina-deep: #2e8b57;
      --verina-text: #1a4030;
      --verina-gold: #ffd700;
      --verina-light-gold: #fff8dc;
      --verina-leaf: #90ee90;
      --verina-forest: #228b22;
      --glass-bg: rgba(255, 255, 255, 0.85);
    }

    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'PingFang SC', 'HarmonyOS Sans SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    ::selection { background: rgba(102, 205, 170, 0.28); color: var(--verina-text); }

    /* === 背景层：原图 + 高斯模糊 === */
    .background-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('https://prod-alicdn-community.kurobbs.com/forum/f3bc28108d8b4d7a8bb80265c030965c20240805.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: blur(3px);
      transform: scale(1.05);
      z-index: -10;
    }

    /* === 背景叠加层 === */
    .background-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        180deg,
        rgba(255, 248, 220, 0.12) 0%,
        rgba(144, 238, 144, 0.06) 50%,
        rgba(34, 139, 34, 0.1) 100%
      );
      z-index: -9;
    }

    /* === 丁达尔光效 - 增强版多层光束 === */
    .tyndall-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    /* 顶部强光源 */
    .light-glow-top {
      position: absolute;
      top: -15%;
      left: 50%;
      transform: translateX(-50%);
      width: 120%;
      height: 55%;
      background: radial-gradient(
        ellipse 90% 70% at 50% 0%,
        rgba(255, 255, 230, 0.85) 0%,
        rgba(255, 252, 220, 0.6) 20%,
        rgba(255, 248, 200, 0.35) 45%,
        rgba(255, 255, 255, 0) 75%
      );
      animation: glowPulse 6s ease-in-out infinite;
    }

    /* 第二层光晕 - 偏暖色 */
    .light-glow-warm {
      position: absolute;
      top: -10%;
      left: 40%;
      transform: translateX(-50%);
      width: 80%;
      height: 50%;
      background: radial-gradient(
        ellipse 70% 60% at 50% 0%,
        rgba(255, 245, 200, 0.5) 0%,
        rgba(255, 240, 180, 0.25) 40%,
        transparent 70%
      );
      animation: glowPulseWarm 8s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.9; transform: translateX(-50%) scale(1); }
      50% { opacity: 1; transform: translateX(-50%) scale(1.03); }
    }

    @keyframes glowPulseWarm {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 0.85; }
    }

    /* 主光束 - 粗壮明亮 */
    .light-beam {
      position: absolute;
      top: -30%;
      height: 140%;
      background: linear-gradient(
        180deg,
        rgba(255, 255, 240, 0.95) 0%,
        rgba(255, 255, 220, 0.7) 15%,
        rgba(255, 252, 200, 0.45) 35%,
        rgba(255, 250, 180, 0.2) 60%,
        rgba(255, 255, 200, 0.05) 85%,
        transparent 100%
      );
      transform-origin: top center;
      filter: blur(8px);
    }

    .light-beam:nth-child(1) {
      left: 5%;
      width: 200px;
      transform: rotate(-18deg);
      opacity: 0.75;
      animation: beamSway1 14s ease-in-out infinite;
    }
    .light-beam:nth-child(2) {
      left: 20%;
      width: 140px;
      transform: rotate(-8deg);
      opacity: 0.6;
      animation: beamSway2 18s ease-in-out infinite;
      filter: blur(12px);
    }
    .light-beam:nth-child(3) {
      left: 42%;
      width: 250px;
      transform: rotate(2deg);
      opacity: 0.9;
      animation: beamSway3 16s ease-in-out infinite;
      filter: blur(6px);
    }
    .light-beam:nth-child(4) {
      left: 60%;
      width: 160px;
      transform: rotate(10deg);
      opacity: 0.65;
      animation: beamSway4 20s ease-in-out infinite;
      filter: blur(10px);
    }
    .light-beam:nth-child(5) {
      left: 78%;
      width: 180px;
      transform: rotate(16deg);
      opacity: 0.7;
      animation: beamSway5 15s ease-in-out infinite;
    }
    .light-beam:nth-child(6) {
      left: 35%;
      width: 80px;
      transform: rotate(-3deg);
      opacity: 0.5;
      animation: beamSway6 22s ease-in-out infinite;
      filter: blur(15px);
    }
    .light-beam:nth-child(7) {
      left: 55%;
      width: 90px;
      transform: rotate(6deg);
      opacity: 0.45;
      animation: beamSway7 19s ease-in-out infinite;
      filter: blur(14px);
    }

    @keyframes beamSway1 {
      0%, 100% { transform: rotate(-18deg) translateX(0); opacity: 0.75; }
      50% { transform: rotate(-14deg) translateX(30px); opacity: 0.55; }
    }
    @keyframes beamSway2 {
      0%, 100% { transform: rotate(-8deg) translateX(0); opacity: 0.6; }
      50% { transform: rotate(-12deg) translateX(-25px); opacity: 0.8; }
    }
    @keyframes beamSway3 {
      0%, 100% { transform: rotate(2deg) translateX(0); opacity: 0.9; }
      50% { transform: rotate(5deg) translateX(20px); opacity: 0.7; }
    }
    @keyframes beamSway4 {
      0%, 100% { transform: rotate(10deg) translateX(0); opacity: 0.65; }
      50% { transform: rotate(6deg) translateX(-30px); opacity: 0.85; }
    }
    @keyframes beamSway5 {
      0%, 100% { transform: rotate(16deg) translateX(0); opacity: 0.7; }
      50% { transform: rotate(20deg) translateX(25px); opacity: 0.5; }
    }
    @keyframes beamSway6 {
      0%, 100% { transform: rotate(-3deg) translateX(0); opacity: 0.5; }
      50% { transform: rotate(0deg) translateX(15px); opacity: 0.7; }
    }
    @keyframes beamSway7 {
      0%, 100% { transform: rotate(6deg) translateX(0); opacity: 0.45; }
      50% { transform: rotate(9deg) translateX(-20px); opacity: 0.65; }
    }

    /* 漂浮光尘粒子层 */
    .dust-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,220,0.8) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 40% 20%, rgba(255,255,200,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 40%, rgba(255,255,220,0.6) 0%, transparent 100%),
        radial-gradient(2px 2px at 80% 25%, rgba(255,255,180,0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 50%, rgba(255,255,220,0.5) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 50% 35%, rgba(255,255,200,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 15%, rgba(255,255,220,0.6) 0%, transparent 100%),
        radial-gradient(2px 2px at 30% 45%, rgba(255,255,190,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 55%, rgba(255,255,220,0.7) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 25% 15%, rgba(255,255,200,0.6) 0%, transparent 100%);
      animation: dustFloat 30s linear infinite;
    }

    @keyframes dustFloat {
      0% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(20px) translateX(10px); }
      100% { transform: translateY(0) translateX(0); }
    }

    /* === 浮动元素层 === */
    #nature-effects {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }

    /* 使用 CSS 绘制的花草元素 */
    .nature-sprite {
      position: absolute;
      will-change: transform, opacity;
    }

    /* 花朵样式 */
    .flower-gold {
      width: 20px;
      height: 20px;
      background: radial-gradient(circle at 50% 50%, #fff8dc 20%, #ffd700 50%, #daa520 100%);
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.2));
    }

    .flower-white {
      width: 18px;
      height: 18px;
      position: relative;
    }
    .flower-white::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, #fffacd 30%, white 70%);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      box-shadow:
        8px 0 0 -2px rgba(255,255,255,0.9),
        -8px 0 0 -2px rgba(255,255,255,0.9),
        0 8px 0 -2px rgba(255,255,255,0.9),
        0 -8px 0 -2px rgba(255,255,255,0.9);
    }

    .petal-pink {
      width: 12px;
      height: 18px;
      background: linear-gradient(135deg, #ffb7c5 0%, #ffc0cb 50%, #ffb6c1 100%);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      opacity: 0.85;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
    }

    .leaf-green {
      width: 16px;
      height: 24px;
      background: linear-gradient(135deg, #90ee90 0%, #66cdaa 50%, #3cb371 100%);
      border-radius: 50% 80% 50% 80%;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.15));
    }
    .leaf-green::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 20%;
      width: 1px;
      height: 60%;
      background: rgba(0,100,0,0.3);
    }

    .leaf-dark {
      width: 18px;
      height: 26px;
      background: linear-gradient(135deg, #3cb371 0%, #2e8b57 50%, #228b22 100%);
      border-radius: 50% 80% 50% 80%;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.15));
    }

    .maple-leaf {
      width: 22px;
      height: 22px;
      background: linear-gradient(135deg, #98d8aa 0%, #66cdaa 100%);
      clip-path: polygon(50% 0%, 65% 25%, 100% 30%, 75% 50%, 85% 100%, 50% 75%, 15% 100%, 25% 50%, 0% 30%, 35% 25%);
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.15));
    }

    .clover {
      width: 18px;
      height: 22px;
      position: relative;
    }
    .clover::before {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      background: #2e8b57;
      border-radius: 50% 50% 50% 0;
      top: 0;
      left: 50%;
      transform: translateX(-50%) rotate(-45deg);
      box-shadow:
        -6px 8px 0 0 #3cb371,
        6px 8px 0 0 #3cb371;
    }
    .clover::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 2px;
      height: 10px;
      background: #228b22;
      transform: translateX(-50%);
    }

    .dandelion {
      width: 24px;
      height: 30px;
      position: relative;
    }
    .dandelion::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 6px;
      height: 6px;
      background: #ddd;
      border-radius: 50%;
    }
    .dandelion::after {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 20px;
      background: radial-gradient(circle, rgba(255,255,255,0.9) 20%, transparent 60%);
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(255,255,255,0.5);
    }

    /* 光斑 */
    .light-particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      will-change: transform, opacity;
    }

    /* 萤火虫 */
    .firefly {
      position: absolute;
      width: 5px;
      height: 5px;
      background: radial-gradient(circle, rgba(255, 255, 200, 1) 0%, rgba(255, 255, 150, 0.6) 50%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      will-change: transform, opacity;
      box-shadow: 0 0 8px 2px rgba(255, 255, 150, 0.5);
    }

    /* === 飘落动画 === */
    @keyframes fall {
      0% {
        transform: translateY(-50px) translateX(0) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translateY(calc(100vh + 50px)) translateX(var(--drift)) rotate(var(--spin));
        opacity: 0;
      }
    }

    @keyframes fallWavy {
      0% {
        transform: translateY(-50px) translateX(0) rotate(0deg);
        opacity: 0;
      }
      10% { opacity: 1; }
      25% { transform: translateY(25vh) translateX(calc(var(--wave) * 1)) rotate(90deg); }
      50% { transform: translateY(50vh) translateX(calc(var(--wave) * -0.5)) rotate(180deg); }
      75% { transform: translateY(75vh) translateX(calc(var(--wave) * 0.7)) rotate(270deg); }
      100% {
        transform: translateY(calc(100vh + 50px)) translateX(var(--drift)) rotate(var(--spin));
        opacity: 0;
      }
    }

    @keyframes floatParticle {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 0;
      }
      20% { opacity: 0.6; }
      80% { opacity: 0.6; }
      100% {
        transform: translate(var(--dx), var(--dy)) scale(0.5);
        opacity: 0;
      }
    }

    @keyframes fireflyFloat {
      0% { transform: translate(0, 0); opacity: 0; }
      10% { opacity: 0.9; }
      25% { transform: translate(var(--f1x), var(--f1y)); opacity: 0.3; }
      50% { transform: translate(var(--f2x), var(--f2y)); opacity: 1; }
      75% { transform: translate(var(--f3x), var(--f3y)); opacity: 0.4; }
      100% { transform: translate(var(--f4x), var(--f4y)); opacity: 0; }
    }

    /* === 卡片容器（沿用登录页玻璃卡片） === */
    .login-container {
      background-color: rgba(255, 255, 255, 0.9);
      padding: 2.2rem 2rem;
      border-radius: 24px;
      box-shadow:
        0 28px 64px -22px rgba(20, 60, 40, 0.32),
        0 8px 22px -12px rgba(20, 60, 40, 0.16),
        inset 0 1px 0 rgba(255, 255, 255, 0.95),
        0 0 70px rgba(102, 205, 170, 0.12);
      backdrop-filter: blur(18px) saturate(1.1);
      -webkit-backdrop-filter: blur(18px) saturate(1.1);
      width: 88%;
      max-width: 360px;
      position: relative;
      z-index: 10;
      text-align: center;
      animation: cardEnter 0.85s cubic-bezier(0.16, 1, 0.3, 1) both,
                 floatContainer 6s ease-in-out 0.85s infinite;
    }
    .login-container:hover { animation-play-state: paused; }

    .login-container::before {
      content: '';
      position: absolute;
      top: -2px; left: -2px; right: -2px; bottom: -2px;
      border-radius: 26px;
      background: linear-gradient(135deg,
        rgba(255, 215, 0, 0.25) 0%,
        rgba(102, 205, 170, 0.15) 50%,
        rgba(144, 238, 144, 0.25) 100%
      );
      z-index: -1;
      opacity: 0.5;
      animation: borderGlow 4s ease-in-out infinite;
    }

    @keyframes borderGlow {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }
    @keyframes floatContainer {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes cardEnter {
      from { opacity: 0; transform: translateY(26px) scale(0.965); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* 头像（沿用登录页 banner 圆形描边 + 旋转金边） */
    .error-avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid #fff;
      box-shadow: 0 6px 16px rgba(46, 139, 87, 0.32), 0 0 0 1px rgba(255, 255, 255, 0.6);
      position: relative;
      margin: 0 auto 14px;
      animation: avatarBob 4s ease-in-out infinite;
    }
    .error-avatar::after {
      content: '';
      position: absolute;
      top: -3px; left: -3px; right: -3px; bottom: -3px;
      border-radius: 50%;
      border: 2px dashed var(--verina-gold);
      animation: spinRing 25s linear infinite;
    }
    .error-avatar img { width: 100%; height: 100%; object-fit: cover; }
    @keyframes spinRing { 100% { transform: rotate(360deg); } }
    @keyframes avatarBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    /* 大号 404 */
    .error-code {
      font-size: clamp(3.6rem, 16vw, 5rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: 2px;
      margin: 2px 0 10px;
      display: inline-block;
      background: linear-gradient(135deg, var(--verina-forest) 0%, var(--verina-deep) 40%, #e3cf57 100%);
      -webkit-background-clip: text;
              background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }

    .error-msg {
      margin: 0 0 4px;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--verina-text);
      line-height: 1.55;
    }
    .error-msg em {
      font-style: normal;
      background: linear-gradient(transparent 60%, rgba(255, 215, 0, 0.42) 60%);
      padding: 0 2px;
    }
    .error-sub {
      margin: 4px 0 0;
      font-size: 13px;
      color: #557766;
      line-height: 1.5;
    }

    /* 倒计时 */
    .countdown-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin: 18px 0 2px;
      text-align: left;
    }
    .ring {
      position: relative;
      width: 46px; height: 46px;
      flex-shrink: 0;
    }
    .ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    .ring__track { stroke: rgba(46, 139, 87, 0.15); fill: none; stroke-width: 3.5; }
    .ring__bar {
      stroke: var(--verina-deep);
      fill: none;
      stroke-width: 3.5;
      stroke-linecap: round;
      stroke-dasharray: 125.6;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear;
    }
    .ring__num {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
      color: var(--verina-deep);
      font-variant-numeric: tabular-nums;
    }
    .row__text {
      font-size: 13px;
      color: var(--verina-text);
      line-height: 1.45;
    }
    .row__text b { font-weight: 700; color: var(--verina-deep); }
    .home-url {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      color: var(--verina-deep);
      font-weight: 700;
    }

    /* 回家按钮（沿用登录页主按钮的渐变呼吸 + 高光扫过） */
    .home-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      box-sizing: border-box;
      margin-top: 18px;
      padding: 0.9rem;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #fff;
      text-decoration: none;
      cursor: pointer;
      background: linear-gradient(90deg, #66cdaa, #3cb371, #e3cf57, #66cdaa);
      background-size: 300% 100%;
      animation: breathFlow 5s ease-in-out infinite;
      box-shadow: 0 8px 20px rgba(46, 139, 87, 0.25);
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
    }
    @keyframes breathFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .home-btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: -130%;
      width: 60%;
      height: 100%;
      background: linear-gradient(100deg, transparent, rgba(255, 255, 255, 0.5), transparent);
      transform: skewX(-20deg);
      transition: left 0.6s ease;
      pointer-events: none;
    }
    .home-btn:hover { transform: translateY(-2px); box-shadow: 0 14px 28px rgba(46, 139, 87, 0.32); }
    .home-btn:hover::after { left: 140%; }
    .home-btn:active { transform: translateY(0) scale(0.98); }
    .home-btn svg { width: 15px; height: 15px; transition: transform 0.2s ease; }
    .home-btn:hover svg { transform: translateX(3px); }

    /* 内容逐项淡入 */
    .error-avatar { animation: avatarBob 4s ease-in-out infinite, riseIn 0.6s ease 0.18s both; }
    .error-code { animation: riseIn 0.55s ease 0.3s both; }
    .error-msg { animation: riseIn 0.55s ease 0.4s both; }
    .error-sub { animation: riseIn 0.55s ease 0.48s both; }
    .countdown-row { animation: riseIn 0.55s ease 0.56s both; }
    .home-btn { animation: breathFlow 5s ease-in-out infinite, riseIn 0.55s ease 0.64s both; }
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: none; }
    }

    @media (max-width: 480px) {
      .login-container { width: 85%; padding: 1.7rem 1.4rem; }
      .error-code { font-size: clamp(3rem, 18vw, 4.4rem); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    @media (max-height: 540px) {
      body { align-items: flex-start; overflow-y: auto; padding: 20px 0; }
      .login-container { animation: cardEnter 0.85s cubic-bezier(0.16, 1, 0.3, 1) both; margin: 20px auto; }
    }
  </style>
</head>
<body>

<!-- 背景层 -->
<div class="background-layer"></div>
<div class="background-overlay"></div>

<!-- 丁达尔光束 - 多层增强光束系统 -->
<div class="tyndall-container">
  <div class="light-glow-top"></div>
  <div class="light-glow-warm"></div>
  <div class="dust-layer"></div>
  <div class="light-beam"></div>
  <div class="light-beam"></div>
  <div class="light-beam"></div>
  <div class="light-beam"></div>
  <div class="light-beam"></div>
  <div class="light-beam"></div>
  <div class="light-beam"></div>
</div>

<!-- 花草树叶漂浮层 -->
<div id="nature-effects"></div>

<div class="login-container">
  <div class="error-avatar">
    <img src="https://prod-alicdn-community.kurobbs.com/headCode/akijueyuan.jpg?x-oss-process=image%2Fformat%2Cwebp%2Fresize%2Cw_192"
         alt="小维" loading="eager" decoding="async" width="80" height="80">
  </div>
  <div class="error-code">404</div>
  <p class="error-msg">这条小径有些<em>陌生</em>呢…</p>
  <p class="error-sub">没找到要去的页面，小维带你回到主路吧。</p>

  <div class="countdown-row">
    <div class="ring" aria-hidden="true">
      <svg viewBox="0 0 46 46">
        <circle class="ring__track" cx="23" cy="23" r="20"/>
        <circle class="ring__bar" id="ringBar" cx="23" cy="23" r="20"/>
      </svg>
      <span class="ring__num" id="ringNum">3</span>
    </div>
    <div class="row__text">
      <b id="countdownText">3 秒后自动跳转</b><br>
      前往 <span class="home-url">mc.kurogames.com</span>
    </div>
  </div>

  <a class="home-btn" id="redirectBtn" href="https://mc.kurogames.com/main">
    立即回家
    <svg viewBox="0 0 14 14" fill="none">
      <path d="M3 7 H11 M7 3 L11 7 L7 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>
</div>

<script>
  // === 自然特效系统（与登录页一致：CSS 绘制的花草 / 光斑 / 萤火虫） ===
  (function initNatureEffects() {
    const container = document.getElementById('nature-effects');

    const spriteTypes = [
      { className: 'flower-gold', weight: 15, scale: [0.8, 1.3] },
      { className: 'flower-white', weight: 10, scale: [0.7, 1.2] },
      { className: 'petal-pink', weight: 14, scale: [0.6, 1.1] },
      { className: 'leaf-green', weight: 18, scale: [0.7, 1.3] },
      { className: 'leaf-dark', weight: 12, scale: [0.8, 1.4] },
      { className: 'maple-leaf', weight: 10, scale: [0.7, 1.2] },
      { className: 'clover', weight: 8, scale: [0.6, 1.0] },
      { className: 'dandelion', weight: 6, scale: [0.8, 1.2] },
    ];

    const totalWeight = spriteTypes.reduce((s, t) => s + t.weight, 0);

    function getRandomType() {
      let r = Math.random() * totalWeight;
      for (const type of spriteTypes) {
        r -= type.weight;
        if (r <= 0) return type;
      }
      return spriteTypes[0];
    }

    function randomBetween(min, max) {
      return Math.random() * (max - min) + min;
    }

    function spawnSprite() {
      const type = getRandomType();
      const el = document.createElement('div');
      el.className = `nature-sprite ${type.className}`;

      const scale = randomBetween(type.scale[0], type.scale[1]);
      el.style.transform = `scale(${scale})`;
      el.style.left = `${Math.random() * 100}%`;

      const drift = randomBetween(-150, 150) + 'px';
      const spin = randomBetween(-360, 360) + 'deg';
      const wave = randomBetween(-80, 80) + 'px';
      const duration = randomBetween(10, 18);
      const useWavy = Math.random() > 0.5;

      el.style.setProperty('--drift', drift);
      el.style.setProperty('--spin', spin);
      el.style.setProperty('--wave', wave);
      el.style.animation = `${useWavy ? 'fallWavy' : 'fall'} ${duration}s linear`;

      container.appendChild(el);
      setTimeout(() => el.remove(), duration * 1000);
    }

    function spawnLightParticle() {
      const el = document.createElement('div');
      el.className = 'light-particle';

      const size = randomBetween(30, 80);
      el.style.width = size + 'px';
      el.style.height = size + 'px';

      const colors = [
        'radial-gradient(circle, rgba(255,255,200,0.5) 0%, transparent 70%)',
        'radial-gradient(circle, rgba(255,248,220,0.4) 0%, transparent 70%)',
        'radial-gradient(circle, rgba(200,255,200,0.35) 0%, transparent 70%)',
      ];
      el.style.background = colors[Math.floor(Math.random() * colors.length)];

      el.style.left = `${Math.random() * 100}%`;
      el.style.top = `${Math.random() * 100}%`;

      el.style.setProperty('--dx', randomBetween(-100, 100) + 'px');
      el.style.setProperty('--dy', randomBetween(-100, 100) + 'px');

      const duration = randomBetween(8, 14);
      el.style.animation = `floatParticle ${duration}s ease-in-out`;

      container.appendChild(el);
      setTimeout(() => el.remove(), duration * 1000);
    }

    function spawnFirefly() {
      const el = document.createElement('div');
      el.className = 'firefly';

      el.style.left = `${Math.random() * 100}%`;
      el.style.top = `${randomBetween(20, 80)}%`;

      el.style.setProperty('--f1x', randomBetween(-60, 60) + 'px');
      el.style.setProperty('--f1y', randomBetween(-40, 40) + 'px');
      el.style.setProperty('--f2x', randomBetween(-80, 80) + 'px');
      el.style.setProperty('--f2y', randomBetween(-60, 60) + 'px');
      el.style.setProperty('--f3x', randomBetween(-60, 60) + 'px');
      el.style.setProperty('--f3y', randomBetween(-40, 40) + 'px');
      el.style.setProperty('--f4x', randomBetween(-100, 100) + 'px');
      el.style.setProperty('--f4y', randomBetween(-80, 80) + 'px');

      const duration = randomBetween(6, 12);
      el.style.animation = `fireflyFloat ${duration}s ease-in-out`;

      container.appendChild(el);
      setTimeout(() => el.remove(), duration * 1000);
    }

    for (let i = 0; i < 10; i++) setTimeout(spawnSprite, i * 300);
    for (let i = 0; i < 5; i++) setTimeout(spawnLightParticle, i * 500);
    for (let i = 0; i < 4; i++) setTimeout(spawnFirefly, i * 700);

    setInterval(spawnSprite, 500);
    setInterval(spawnLightParticle, 2500);
    setInterval(spawnFirefly, 3500);
  })();

  // === 倒计时 + 跳转 ===
  (() => {
    const TOTAL = 3;
    const RING_LEN = 125.6; // 2 * pi * 20
    let remain = TOTAL;
    const ringBar = document.getElementById('ringBar');
    const ringNum = document.getElementById('ringNum');
    const cdText  = document.getElementById('countdownText');
    const cta     = document.getElementById('redirectBtn');
    const redirectUrl = 'https://mc.kurogames.com/main';

    function paint() {
      const pct = remain / TOTAL;
      ringBar.style.strokeDashoffset = String((1 - pct) * RING_LEN);
      ringNum.textContent = Math.max(0, remain);
      cdText.textContent = remain > 0 ? `${remain} 秒后自动跳转` : '正在跳转…';
    }
    paint();
    const t = setInterval(() => {
      remain -= 1;
      paint();
      if (remain <= 0) {
        clearInterval(t);
        location.href = redirectUrl;
      }
    }, 1000);

    cta.addEventListener('click', e => {
      e.preventDefault();
      clearInterval(t);
      location.href = redirectUrl;
    });
  })();
</script>

</body>
</html>
