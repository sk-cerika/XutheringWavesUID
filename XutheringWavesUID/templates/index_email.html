<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#d8f0e4">
  <title>小维 - Verina · 邮箱登录</title>
  <link rel="icon" href="https://web-static.kurobbs.com/resource/prod/icon.ico" type="image/x-icon">
  <style>
    /* === 核心配色变量 === */
    :root {
      --verina-mint: #66cdaa;
      --verina-deep: #2e8b57;
      --verina-text: #1a4030;
      --verina-gold: #ffd700;
      --verina-light-gold: #fff8dc;
      --verina-leaf: #90ee90;
      --verina-forest: #228b22;
      --glass-bg: rgba(255, 255, 255, 0.85);
    }

    body, html {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      min-height: 100dvh;
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
    }

    /* === 背景层：原图 + 高斯模糊 === */
    .background-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('https://prod-alicdn-community.kurobbs.com/forum/f3bc28108d8b4d7a8bb80265c030965c20240805.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: blur(3px);
      transform: scale(1.05);
      z-index: -10;
    }

    /* === 背景叠加层 === */
    .background-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        180deg,
        rgba(255, 248, 220, 0.12) 0%,
        rgba(144, 238, 144, 0.06) 50%,
        rgba(34, 139, 34, 0.1) 100%
      );
      z-index: -9;
    }

    /* === 丁达尔光效 - 增强版多层光束 === */
    .tyndall-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    /* 顶部强光源 */
    .light-glow-top {
      position: absolute;
      top: -15%;
      left: 50%;
      transform: translateX(-50%);
      width: 120%;
      height: 55%;
      background: radial-gradient(
        ellipse 90% 70% at 50% 0%,
        rgba(255, 255, 230, 0.85) 0%,
        rgba(255, 252, 220, 0.6) 20%,
        rgba(255, 248, 200, 0.35) 45%,
        rgba(255, 255, 255, 0) 75%
      );
      animation: glowPulse 6s ease-in-out infinite;
    }

    /* 第二层光晕 - 偏暖色 */
    .light-glow-warm {
      position: absolute;
      top: -10%;
      left: 40%;
      transform: translateX(-50%);
      width: 80%;
      height: 50%;
      background: radial-gradient(
        ellipse 70% 60% at 50% 0%,
        rgba(255, 245, 200, 0.5) 0%,
        rgba(255, 240, 180, 0.25) 40%,
        transparent 70%
      );
      animation: glowPulseWarm 8s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.9; transform: translateX(-50%) scale(1); }
      50% { opacity: 1; transform: translateX(-50%) scale(1.03); }
    }

    @keyframes glowPulseWarm {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 0.85; }
    }

    /* 主光束 - 粗壮明亮 */
    .light-beam {
      position: absolute;
      top: -30%;
      height: 140%;
      background: linear-gradient(
        180deg,
        rgba(255, 255, 240, 0.95) 0%,
        rgba(255, 255, 220, 0.7) 15%,
        rgba(255, 252, 200, 0.45) 35%,
        rgba(255, 250, 180, 0.2) 60%,
        rgba(255, 255, 200, 0.05) 85%,
        transparent 100%
      );
      transform-origin: top center;
      filter: blur(8px);
    }

    /* 光束1 - 左侧主光束 */
    .light-beam:nth-child(1) {
      left: 5%;
      width: 200px;
      transform: rotate(-18deg);
      opacity: 0.75;
      animation: beamSway1 14s ease-in-out infinite;
    }

    /* 光束2 */
    .light-beam:nth-child(2) {
      left: 20%;
      width: 140px;
      transform: rotate(-8deg);
      opacity: 0.6;
      animation: beamSway2 18s ease-in-out infinite;
      filter: blur(12px);
    }

    /* 光束3 - 中央主光束（最亮） */
    .light-beam:nth-child(3) {
      left: 42%;
      width: 250px;
      transform: rotate(2deg);
      opacity: 0.9;
      animation: beamSway3 16s ease-in-out infinite;
      filter: blur(6px);
    }

    /* 光束4 */
    .light-beam:nth-child(4) {
      left: 60%;
      width: 160px;
      transform: rotate(10deg);
      opacity: 0.65;
      animation: beamSway4 20s ease-in-out infinite;
      filter: blur(10px);
    }

    /* 光束5 - 右侧主光束 */
    .light-beam:nth-child(5) {
      left: 78%;
      width: 180px;
      transform: rotate(16deg);
      opacity: 0.7;
      animation: beamSway5 15s ease-in-out infinite;
    }

    /* 光束6 - 额外细光束 */
    .light-beam:nth-child(6) {
      left: 35%;
      width: 80px;
      transform: rotate(-3deg);
      opacity: 0.5;
      animation: beamSway6 22s ease-in-out infinite;
      filter: blur(15px);
    }

    /* 光束7 - 额外细光束 */
    .light-beam:nth-child(7) {
      left: 55%;
      width: 90px;
      transform: rotate(6deg);
      opacity: 0.45;
      animation: beamSway7 19s ease-in-out infinite;
      filter: blur(14px);
    }

    @keyframes beamSway1 {
      0%, 100% { transform: rotate(-18deg) translateX(0); opacity: 0.75; }
      50% { transform: rotate(-14deg) translateX(30px); opacity: 0.55; }
    }
    @keyframes beamSway2 {
      0%, 100% { transform: rotate(-8deg) translateX(0); opacity: 0.6; }
      50% { transform: rotate(-12deg) translateX(-25px); opacity: 0.8; }
    }
    @keyframes beamSway3 {
      0%, 100% { transform: rotate(2deg) translateX(0); opacity: 0.9; }
      50% { transform: rotate(5deg) translateX(20px); opacity: 0.7; }
    }
    @keyframes beamSway4 {
      0%, 100% { transform: rotate(10deg) translateX(0); opacity: 0.65; }
      50% { transform: rotate(6deg) translateX(-30px); opacity: 0.85; }
    }
    @keyframes beamSway5 {
      0%, 100% { transform: rotate(16deg) translateX(0); opacity: 0.7; }
      50% { transform: rotate(20deg) translateX(25px); opacity: 0.5; }
    }
    @keyframes beamSway6 {
      0%, 100% { transform: rotate(-3deg) translateX(0); opacity: 0.5; }
      50% { transform: rotate(0deg) translateX(15px); opacity: 0.7; }
    }
    @keyframes beamSway7 {
      0%, 100% { transform: rotate(6deg) translateX(0); opacity: 0.45; }
      50% { transform: rotate(9deg) translateX(-20px); opacity: 0.65; }
    }

    /* 漂浮光尘粒子层 */
    .dust-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,220,0.8) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 40% 20%, rgba(255,255,200,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 40%, rgba(255,255,220,0.6) 0%, transparent 100%),
        radial-gradient(2px 2px at 80% 25%, rgba(255,255,180,0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 50%, rgba(255,255,220,0.5) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 50% 35%, rgba(255,255,200,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 15%, rgba(255,255,220,0.6) 0%, transparent 100%),
        radial-gradient(2px 2px at 30% 45%, rgba(255,255,190,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 55%, rgba(255,255,220,0.7) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 25% 15%, rgba(255,255,200,0.6) 0%, transparent 100%);
      animation: dustFloat 30s linear infinite;
    }

    @keyframes dustFloat {
      0% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(20px) translateX(10px); }
      100% { transform: translateY(0) translateX(0); }
    }

    /* === 浮动元素层 === */
    #nature-effects {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }

    /* 使用 CSS 绘制的花草元素 */
    .nature-sprite {
      position: absolute;
      will-change: transform, opacity;
    }

    /* 花朵样式 */
    .flower-gold {
      width: 20px;
      height: 20px;
      background: radial-gradient(circle at 50% 50%, #fff8dc 20%, #ffd700 50%, #daa520 100%);
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.2));
    }

    .flower-white {
      width: 18px;
      height: 18px;
      position: relative;
    }
    .flower-white::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, #fffacd 30%, white 70%);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      box-shadow:
        8px 0 0 -2px rgba(255,255,255,0.9),
        -8px 0 0 -2px rgba(255,255,255,0.9),
        0 8px 0 -2px rgba(255,255,255,0.9),
        0 -8px 0 -2px rgba(255,255,255,0.9);
    }

    .petal-pink {
      width: 12px;
      height: 18px;
      background: linear-gradient(135deg, #ffb7c5 0%, #ffc0cb 50%, #ffb6c1 100%);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      opacity: 0.85;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
    }

    .leaf-green {
      width: 16px;
      height: 24px;
      background: linear-gradient(135deg, #90ee90 0%, #66cdaa 50%, #3cb371 100%);
      border-radius: 50% 80% 50% 80%;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.15));
    }
    .leaf-green::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 20%;
      width: 1px;
      height: 60%;
      background: rgba(0,100,0,0.3);
    }

    .leaf-dark {
      width: 18px;
      height: 26px;
      background: linear-gradient(135deg, #3cb371 0%, #2e8b57 50%, #228b22 100%);
      border-radius: 50% 80% 50% 80%;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.15));
    }

    .maple-leaf {
      width: 22px;
      height: 22px;
      background: linear-gradient(135deg, #98d8aa 0%, #66cdaa 100%);
      clip-path: polygon(50% 0%, 65% 25%, 100% 30%, 75% 50%, 85% 100%, 50% 75%, 15% 100%, 25% 50%, 0% 30%, 35% 25%);
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.15));
    }

    .clover {
      width: 18px;
      height: 22px;
      position: relative;
    }
    .clover::before {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      background: #2e8b57;
      border-radius: 50% 50% 50% 0;
      top: 0;
      left: 50%;
      transform: translateX(-50%) rotate(-45deg);
      box-shadow:
        -6px 8px 0 0 #3cb371,
        6px 8px 0 0 #3cb371;
    }
    .clover::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 2px;
      height: 10px;
      background: #228b22;
      transform: translateX(-50%);
    }

    .dandelion {
      width: 24px;
      height: 30px;
      position: relative;
    }
    .dandelion::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 6px;
      height: 6px;
      background: #ddd;
      border-radius: 50%;
    }
    .dandelion::after {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 20px;
      background: radial-gradient(circle, rgba(255,255,255,0.9) 20%, transparent 60%);
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(255,255,255,0.5);
    }

    /* 光斑 */
    .light-particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      will-change: transform, opacity;
    }

    /* 萤火虫 */
    .firefly {
      position: absolute;
      width: 5px;
      height: 5px;
      background: radial-gradient(circle, rgba(255, 255, 200, 1) 0%, rgba(255, 255, 150, 0.6) 50%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      will-change: transform, opacity;
      box-shadow: 0 0 8px 2px rgba(255, 255, 150, 0.5);
    }

    /* === 飘落动画 === */
    @keyframes fall {
      0% {
        transform: translateY(-50px) translateX(0) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translateY(calc(100vh + 50px)) translateX(var(--drift)) rotate(var(--spin));
        opacity: 0;
      }
    }

    @keyframes fallWavy {
      0% {
        transform: translateY(-50px) translateX(0) rotate(0deg);
        opacity: 0;
      }
      10% { opacity: 1; }
      25% { transform: translateY(25vh) translateX(calc(var(--wave) * 1)) rotate(90deg); }
      50% { transform: translateY(50vh) translateX(calc(var(--wave) * -0.5)) rotate(180deg); }
      75% { transform: translateY(75vh) translateX(calc(var(--wave) * 0.7)) rotate(270deg); }
      100% {
        transform: translateY(calc(100vh + 50px)) translateX(var(--drift)) rotate(var(--spin));
        opacity: 0;
      }
    }

    @keyframes floatParticle {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 0;
      }
      20% { opacity: 0.6; }
      80% { opacity: 0.6; }
      100% {
        transform: translate(var(--dx), var(--dy)) scale(0.5);
        opacity: 0;
      }
    }

    @keyframes fireflyFloat {
      0% { transform: translate(0, 0); opacity: 0; }
      10% { opacity: 0.9; }
      25% { transform: translate(var(--f1x), var(--f1y)); opacity: 0.3; }
      50% { transform: translate(var(--f2x), var(--f2y)); opacity: 1; }
      75% { transform: translate(var(--f3x), var(--f3y)); opacity: 0.4; }
      100% { transform: translate(var(--f4x), var(--f4y)); opacity: 0; }
    }

    /* === 登录框 === */
    .login-container {
      background-color: var(--glass-bg);
      padding: 2rem;
      border-radius: 24px;
      box-shadow:
        0 20px 50px rgba(20, 60, 40, 0.2),
        0 0 0 1px rgba(255, 255, 255, 1) inset,
        0 0 60px rgba(102, 205, 170, 0.1);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      width: 88%;
      max-width: 380px;
      margin: auto;
      position: relative;
      z-index: 10;
      animation: floatContainer 6s ease-in-out infinite;
    }

    .login-container::before {
      content: '';
      position: absolute;
      top: -2px; left: -2px; right: -2px; bottom: -2px;
      border-radius: 26px;
      background: linear-gradient(135deg,
        rgba(255, 215, 0, 0.25) 0%,
        rgba(102, 205, 170, 0.15) 50%,
        rgba(144, 238, 144, 0.25) 100%
      );
      z-index: -1;
      opacity: 0.5;
      animation: borderGlow 4s ease-in-out infinite;
    }

    @keyframes borderGlow {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }

    @keyframes floatContainer {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .login-container:hover {
      animation-play-state: paused;
    }

    .login-header {
      display: flex;
      align-items: center;
      margin-bottom: 1.5rem;
      justify-content: space-between;
    }

    .banner {
      width: 72px; height: 72px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid #fff;
      box-shadow: 0 4px 12px rgba(46, 139, 87, 0.3);
      position: relative;
      flex-shrink: 0;
    }

    .banner::after {
      content: '';
      position: absolute;
      top: -3px; left: -3px; right: -3px; bottom: -3px;
      border-radius: 50%;
      border: 2px dashed var(--verina-gold);
      animation: spinRing 25s linear infinite;
    }
    @keyframes spinRing { 100% { transform: rotate(360deg); } }

    .banner img { width: 100%; height: 100%; object-fit: cover; }
    .banner-text { flex: 1; padding-right: 12px; margin-left: 5px; }

    .welcome-text {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--verina-deep);
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }
    .logo-text {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--verina-text);
      opacity: 0.8;
    }
    .kurobbs-text {
      font-size: 0.75rem;
      font-weight: 600;
      color: #557766;
      margin-top: 4px;
    }

    .input-group { margin-bottom: 1.25rem; }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--verina-text);
      font-weight: 700;
      font-size: 0.9rem;
    }

    input[type="email"], input[type="password"], input[type="text"] {
      width: 100%;
      padding: 0.85rem;
      box-sizing: border-box;
      border: 2px solid rgba(102, 205, 170, 0.4);
      border-radius: 12px;
      font-size: 16px;
      background-color: rgba(255, 255, 255, 0.95);
      color: #333;
      transition: all 0.3s;
    }

    input:focus {
      outline: none;
      border-color: var(--verina-deep);
      box-shadow: 0 0 0 4px rgba(102, 205, 170, 0.2);
    }

    .verification-group { display: flex; gap: 0.6rem; }
    .verification-group input { flex-grow: 1; }

    button[type="submit"] {
      width: 100%;
      padding: 0.9rem;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      margin-top: 10px;
      background: linear-gradient(90deg, #66cdaa, #3cb371, #e3cf57, #66cdaa);
      background-size: 300% 100%;
      animation: breathFlow 5s ease-in-out infinite;
      box-shadow: 0 8px 20px rgba(46, 139, 87, 0.25);
    }

    @keyframes breathFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    button[type="submit"]:active { transform: scale(0.98); }
    button[type="submit"]:disabled {
      background: #bdc3c7;
      cursor: not-allowed;
      animation: none;
      box-shadow: none;
    }

    .user-id-display {
      text-align: center;
      color: var(--verina-text);
      font-weight: 600;
      font-size: 0.85rem;
      margin: 15px 0 5px 0;
      background: rgba(255,255,255,0.5);
      padding: 4px;
      border-radius: 8px;
    }

    /* === 区服选择卡片 === */
    .region-hint {
      color: var(--verina-text);
      font-size: 0.88rem;
      line-height: 1.45;
      margin-bottom: 0.8rem;
      font-weight: 600;
    }
    .region-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .region-card {
      background: rgba(255, 255, 255, 0.95);
      border: 2px solid rgba(102, 205, 170, 0.3);
      border-radius: 14px;
      padding: 0.85rem 1.1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .region-card:hover {
      transform: translateY(-2px);
      border-color: var(--verina-deep);
      box-shadow: 0 8px 18px rgba(46, 139, 87, 0.2);
    }
    .region-card .role-meta { display: flex; flex-direction: column; }
    .region-card .role-name { font-weight: 700; color: var(--verina-text); font-size: 0.95rem; }
    .region-card .role-detail { color: #557766; font-size: 0.78rem; margin-top: 2px; }
    .region-card .lv-badge {
      background: linear-gradient(90deg, var(--verina-mint), var(--verina-deep));
      color: white;
      padding: 0.25rem 0.7rem;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    /* === 弹窗样式 === */
    .modal {
      display: none; position: fixed; z-index: 2000; left: 0; top: 0;
      width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.4);
      opacity: 0; transition: opacity 0.3s ease;
      backdrop-filter: blur(5px);
    }
    .modal-content {
      background-color: #fff;
      margin: 40vh auto;
      padding: 30px 20px;
      border-radius: 20px;
      width: 80%; max-width: 320px;
      text-align: center;
      transform: scale(0.8);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    }
    .modal.show { display: block; opacity: 1; }
    .modal.show .modal-content { transform: scale(1); opacity: 1; }

    .close { position: absolute; right: 15px; top: 10px; font-size: 28px; color: #ccc; cursor: pointer; }

    .redirect-button {
      margin-top: 20px; padding: 12px 35px;
      background: var(--verina-mint);
      color: white; border: none; border-radius: 25px;
      font-weight: bold; cursor: pointer;
      box-shadow: 0 5px 15px rgba(102, 205, 170, 0.4);
    }

    /* 移动端适配 */
    @media (max-width: 480px) {
      .login-container { width: 85%; padding: 1.5rem; }
      .welcome-text { font-size: 1.3rem; }
      .modal-content { margin-top: 35vh; }
    }

    /* ===== 视觉优化层：保持清新风格，提升质感 ===== */
    body, html {
      font-family: 'PingFang SC', 'HarmonyOS Sans SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    ::selection { background: rgba(102, 205, 170, 0.28); color: var(--verina-text); }

    /* 卡片：更柔润的多层投影、玻璃质感与入场动画 */
    .login-container {
      background-color: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(18px) saturate(1.1);
      -webkit-backdrop-filter: blur(18px) saturate(1.1);
      box-shadow:
        0 28px 64px -22px rgba(20, 60, 40, 0.32),
        0 8px 22px -12px rgba(20, 60, 40, 0.16),
        inset 0 1px 0 rgba(255, 255, 255, 0.95),
        0 0 70px rgba(102, 205, 170, 0.12);
      animation: cardEnter 0.85s cubic-bezier(0.16, 1, 0.3, 1) both,
                 floatContainer 6s ease-in-out 0.85s infinite;
    }
    @keyframes cardEnter {
      from { opacity: 0; transform: translateY(26px) scale(0.965); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* 内容逐项淡入 */
    .login-header { animation: riseIn 0.6s ease 0.18s both; }
    #loginForm .input-group { animation: riseIn 0.55s ease 0.3s both; }
    #loginForm .input-group + .input-group { animation-delay: 0.4s; }
    #loginForm .user-id-display { animation: riseIn 0.55s ease 0.5s both; }
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: none; }
    }

    /* 输入框：更细腻的描边 / 悬停 / 聚焦 */
    .login-container input {
      border-width: 1.5px;
      border-color: rgba(102, 205, 170, 0.35);
      background-color: rgba(255, 255, 255, 0.92);
      transition: border-color 0.25s ease, box-shadow 0.25s ease, background-color 0.25s ease;
    }
    .login-container input::placeholder { color: #9fb6aa; }
    .login-container input:hover { border-color: rgba(102, 205, 170, 0.6); }
    .login-container input:focus {
      background-color: #fff;
      box-shadow: 0 0 0 4px rgba(102, 205, 170, 0.18);
    }

    /* 主按钮：悬停微抬升 + 高光扫过 */
    button[type="submit"] {
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.3s ease, filter 0.2s ease;
    }
    button[type="submit"]::after {
      content: '';
      position: absolute;
      top: 0;
      left: -130%;
      width: 60%;
      height: 100%;
      background: linear-gradient(100deg, transparent, rgba(255, 255, 255, 0.5), transparent);
      transform: skewX(-20deg);
      transition: left 0.6s ease;
      pointer-events: none;
    }
    button[type="submit"]:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(46, 139, 87, 0.32);
    }
    button[type="submit"]:hover:not(:disabled)::after { left: 140%; }
    button[type="submit"]:active:not(:disabled) { transform: translateY(0) scale(0.98); }

    /* 头像描边光晕 */
    .banner { box-shadow: 0 6px 16px rgba(46, 139, 87, 0.32), 0 0 0 1px rgba(255, 255, 255, 0.6); }

    /* 备注条 / 区服卡片：更精致的描边 */
    .user-id-display {
      line-height: 1.5;
      padding: 7px 10px;
      border: 1px solid rgba(102, 205, 170, 0.18);
      background: rgba(255, 255, 255, 0.6);
    }

    /* 尊重「减少动态效果」系统偏好 */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

  </style>
</head>
<body>

<!-- 背景层 -->
<div class="background-layer"></div>
<div class="background-overlay"></div>

<!-- 丁达尔光束 - 多层增强光束系统 -->
<div class="tyndall-container">
  <div class="light-glow-top"></div>
  <div class="light-glow-warm"></div>
  <div class="dust-layer"></div>
  <div class="light-beam"></div>
  <div class="light-beam"></div>
  <div class="light-beam"></div>
  <div class="light-beam"></div>
  <div class="light-beam"></div>
  <div class="light-beam"></div>
  <div class="light-beam"></div>
</div>

<!-- 花草树叶漂浮层 -->
<div id="nature-effects"></div>

<div class="login-container">
  <div class="login-header">
    <div class="banner-text">
      <div class="welcome-text">欢迎登录</div>
      <div class="logo-text">是小维呀</div>
      <div class="kurobbs-text">邮箱授权</div>
    </div>
    <div class="banner">
      <img src="https://prod-alicdn-community.kurobbs.com/headCode/akijueyuan.jpg?x-oss-process=image%2Fformat%2Cwebp%2Fresize%2Cw_264" alt="Banner">
    </div>
  </div>
  <form id="loginForm">
    <div class="input-group">
      <label for="email">邮箱</label>
      <input type="email" id="email" name="email" required autocomplete="username" placeholder="请输入登录邮箱">
    </div>
    <div class="input-group">
      <label for="password">密码</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="请输入账号密码">
    </div>
    <div id="userIdDisplay" class="user-id-display">你的账号 ID: {{ userId }}，不要点别人的链接哦</div>
    <button type="submit" id="loginBtn" disabled>立即登录</button>
  </form>

  <div id="regionPanel" style="display:none;">
    <div class="region-hint">检测到该账号下有多个区服角色，请选择要绑定的角色：</div>
    <div id="regionList" class="region-list"></div>
  </div>
</div>

<div id="successModal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2 style="color: #2e8b57; margin-bottom: 10px;">🌱 正在尝试登录</h2>
    <p style="color: #555; margin-bottom: 20px;">请返回查看结果！</p>
    <p class="countdown" style="font-size: 13px; color: #888;">3秒后自动跳转</p>
    <button class="redirect-button">立即前往</button>
  </div>
</div>

<script>
  // === 自然特效系统 ===
  (function initNatureEffects() {
    const container = document.getElementById('nature-effects');

    const spriteTypes = [
      { className: 'flower-gold', weight: 15, scale: [0.8, 1.3] },
      { className: 'flower-white', weight: 10, scale: [0.7, 1.2] },
      { className: 'petal-pink', weight: 14, scale: [0.6, 1.1] },
      { className: 'leaf-green', weight: 18, scale: [0.7, 1.3] },
      { className: 'leaf-dark', weight: 12, scale: [0.8, 1.4] },
      { className: 'maple-leaf', weight: 10, scale: [0.7, 1.2] },
      { className: 'clover', weight: 8, scale: [0.6, 1.0] },
      { className: 'dandelion', weight: 6, scale: [0.8, 1.2] },
    ];

    const totalWeight = spriteTypes.reduce((s, t) => s + t.weight, 0);

    function getRandomType() {
      let r = Math.random() * totalWeight;
      for (const type of spriteTypes) {
        r -= type.weight;
        if (r <= 0) return type;
      }
      return spriteTypes[0];
    }

    function randomBetween(min, max) {
      return Math.random() * (max - min) + min;
    }

    function spawnSprite() {
      const type = getRandomType();
      const el = document.createElement('div');
      el.className = `nature-sprite ${type.className}`;

      const scale = randomBetween(type.scale[0], type.scale[1]);
      el.style.transform = `scale(${scale})`;
      el.style.left = `${Math.random() * 100}%`;

      const drift = randomBetween(-150, 150) + 'px';
      const spin = randomBetween(-360, 360) + 'deg';
      const wave = randomBetween(-80, 80) + 'px';
      const duration = randomBetween(10, 18);
      const useWavy = Math.random() > 0.5;

      el.style.setProperty('--drift', drift);
      el.style.setProperty('--spin', spin);
      el.style.setProperty('--wave', wave);
      el.style.animation = `${useWavy ? 'fallWavy' : 'fall'} ${duration}s linear`;

      container.appendChild(el);
      setTimeout(() => el.remove(), duration * 1000);
    }

    function spawnLightParticle() {
      const el = document.createElement('div');
      el.className = 'light-particle';

      const size = randomBetween(30, 80);
      el.style.width = size + 'px';
      el.style.height = size + 'px';

      const colors = [
        'radial-gradient(circle, rgba(255,255,200,0.5) 0%, transparent 70%)',
        'radial-gradient(circle, rgba(255,248,220,0.4) 0%, transparent 70%)',
        'radial-gradient(circle, rgba(200,255,200,0.35) 0%, transparent 70%)',
      ];
      el.style.background = colors[Math.floor(Math.random() * colors.length)];

      el.style.left = `${Math.random() * 100}%`;
      el.style.top = `${Math.random() * 100}%`;

      el.style.setProperty('--dx', randomBetween(-100, 100) + 'px');
      el.style.setProperty('--dy', randomBetween(-100, 100) + 'px');

      const duration = randomBetween(8, 14);
      el.style.animation = `floatParticle ${duration}s ease-in-out`;

      container.appendChild(el);
      setTimeout(() => el.remove(), duration * 1000);
    }

    function spawnFirefly() {
      const el = document.createElement('div');
      el.className = 'firefly';

      el.style.left = `${Math.random() * 100}%`;
      el.style.top = `${randomBetween(20, 80)}%`;

      el.style.setProperty('--f1x', randomBetween(-60, 60) + 'px');
      el.style.setProperty('--f1y', randomBetween(-40, 40) + 'px');
      el.style.setProperty('--f2x', randomBetween(-80, 80) + 'px');
      el.style.setProperty('--f2y', randomBetween(-60, 60) + 'px');
      el.style.setProperty('--f3x', randomBetween(-60, 60) + 'px');
      el.style.setProperty('--f3y', randomBetween(-40, 40) + 'px');
      el.style.setProperty('--f4x', randomBetween(-100, 100) + 'px');
      el.style.setProperty('--f4y', randomBetween(-80, 80) + 'px');

      const duration = randomBetween(6, 12);
      el.style.animation = `fireflyFloat ${duration}s ease-in-out`;

      container.appendChild(el);
      setTimeout(() => el.remove(), duration * 1000);
    }

    for (let i = 0; i < 10; i++) setTimeout(spawnSprite, i * 300);
    for (let i = 0; i < 5; i++) setTimeout(spawnLightParticle, i * 500);
    for (let i = 0; i < 4; i++) setTimeout(spawnFirefly, i * 700);

    setInterval(spawnSprite, 500);
    setInterval(spawnLightParticle, 2500);
    setInterval(spawnFirefly, 3500);
  })();

  // === 邮箱登录业务逻辑 ===
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const loginBtn = document.getElementById('loginBtn');
  const loginForm = document.getElementById('loginForm');
  const regionPanel = document.getElementById('regionPanel');
  const regionList = document.getElementById('regionList');
  const modal = document.getElementById('successModal');
  const closeBtn = modal.querySelector('.close');
  const loginContainer = document.querySelector('.login-container');
  const geetestScriptUrl = 'https://static.geetest.com/v4/gt4.js';

  const captchaId = "1f4565ff7acc97b1a2fc97b921743aa4";
  let captchaInstance = null;
  let captchaReady = false;
  let showEmailCaptcha = null;
  let captchaInitToken = 0;

  function refreshLoginButton() {
    loginBtn.disabled = !(emailInput.value && passwordInput.value && captchaReady);
  }

  emailInput.addEventListener('input', refreshLoginButton);
  passwordInput.addEventListener('input', refreshLoginButton);

  refreshLoginButton();
  initCaptcha();

  loginForm.addEventListener('submit', function (e) {
    e.preventDefault();
    if (!captchaInstance || !showEmailCaptcha) {
      return alert('滑块组件还在加载，请稍后再试');
    }
    showEmailCaptcha();
  });

  function initCaptcha() {
    const token = ++captchaInitToken;
    captchaInstance = null;
    captchaReady = false;
    showEmailCaptcha = null;
    refreshLoginButton();
    hideCaptchaLoadError();

    loadGeetestWithRetry()
      .then(function () {
        if (token !== captchaInitToken) return;
        if (typeof window.initGeetest4 !== 'function') {
          throw new Error('initGeetest4 unavailable');
        }
        window.initGeetest4({
          captchaId: captchaId,
          product: "bind",
          language: "zh-Hans",
        }, function (captcha) {
          if (token !== captchaInitToken) return;
          captchaInstance = captcha;
          captcha.onReady(function () {
            captchaReady = true;
            showEmailCaptcha = function () {
              captcha.showCaptcha();
            };
            refreshLoginButton();
          }).onSuccess(function () {
            const result = captcha.getValidate();
            if (!result) return;
            submitLogin({
              captcha_output: result.captcha_output,
              gen_time: result.gen_time,
              lot_number: result.lot_number,
              pass_token: result.pass_token,
            });
          }).onError(function () {
            alert('验证出错，请重试');
          });
        });
      })
      .catch(function () {
        if (token !== captchaInitToken) return;
        showCaptchaLoadError(initCaptcha);
      });
  }

  function loadGeetestWithRetry() {
    return loadGeetestScript(false).catch(function () {
      return new Promise(function (resolve, reject) {
        setTimeout(function () {
          loadGeetestScript(true).then(resolve).catch(reject);
        }, 2000);
      });
    });
  }

  function loadGeetestScript(useCacheBust) {
    return new Promise(function (resolve, reject) {
      if (typeof window.initGeetest4 === 'function') {
        resolve();
        return;
      }
      document.querySelectorAll('script[data-gt4-loader]').forEach(function (script) {
        script.remove();
      });
      const script = document.createElement('script');
      script.src = geetestScriptUrl + (useCacheBust ? '?retry=' + Date.now() : '');
      script.async = true;
      script.dataset.gt4Loader = 'true';
      script.onload = function () {
        if (typeof window.initGeetest4 === 'function') {
          resolve();
        } else {
          reject(new Error('initGeetest4 unavailable'));
        }
      };
      script.onerror = function () {
        script.remove();
        reject(new Error('gt4 load failed'));
      };
      document.head.appendChild(script);
    });
  }

  function showCaptchaLoadError(retryHandler) {
    const panel = ensureCaptchaLoadError();
    const retryBtn = panel.querySelector('#captchaRetryBtn');
    retryBtn.onclick = retryHandler;
    panel.style.display = 'block';
    refreshLoginButton();
  }

  function hideCaptchaLoadError() {
    const panel = document.getElementById('captchaLoadError');
    if (panel) panel.style.display = 'none';
  }

  function ensureCaptchaLoadError() {
    let panel = document.getElementById('captchaLoadError');
    if (!panel) {
      panel = document.createElement('div');
      panel.id = 'captchaLoadError';
      panel.className = 'user-id-display';
      panel.style.display = 'none';
      panel.innerHTML = '验证组件加载失败，请点击刷新重试<br><button type="button" id="captchaRetryBtn" class="redirect-button" style="margin-top:10px;padding:8px 18px;">刷新重试</button>';
      loginContainer.appendChild(panel);
    }
    return panel;
  }

  function submitLogin(captchaResult) {
    const data = {
      auth: "{{ auth }}",
      email: emailInput.value,
      password: passwordInput.value,
      captcha: captchaResult,
    };
    loginBtn.disabled = true;
    loginBtn.textContent = '登录中…';
    postJson('{{ server_url }}/waves/l/login', data)
      .then(function (res) {
        loginBtn.textContent = '立即登录';
        refreshLoginButton();
        if (!res.success) {
          alert('登录失败' + (res.msg ? '：' + res.msg : '，请重试'));
          return;
        }
        if (res.bound) {
          showSuccessModal();
          return;
        }
        if (res.regions && res.regions.length > 0) {
          showRegionPicker(res.regions);
        } else {
          alert('未查询到任何角色，请确认账号下是否有鸣潮角色');
        }
      })
      .catch(function () {
        loginBtn.textContent = '立即登录';
        refreshLoginButton();
        alert('登录请求失败，请稍后再试');
      });
  }

  function showRegionPicker(regions) {
    loginForm.style.display = 'none';
    regionPanel.style.display = 'block';
    regionList.innerHTML = '';
    regions.forEach(function (r) {
      const card = document.createElement('div');
      card.className = 'region-card';
      card.innerHTML =
        '<div class="role-meta">' +
        '<span class="role-name">' + escapeHtml(r.role_name || '未命名') + '</span>' +
        '<span class="role-detail">' + escapeHtml(r.region) + ' · UID ' + escapeHtml(r.role_id) + '</span>' +
        '</div>' +
        '<span class="lv-badge">Lv.' + (r.level || 0) + '</span>';
      card.addEventListener('click', function () {
        bindRegion(r.role_id, r.region, card);
      });
      regionList.appendChild(card);
    });
  }

  function bindRegion(roleId, region, cardEl) {
    Array.from(regionList.children).forEach(function (c) { c.style.pointerEvents = 'none'; });
    cardEl.style.opacity = '0.6';
    postJson('{{ server_url }}/waves/l/bind', { auth: "{{ auth }}", role_id: roleId, region: region })
      .then(function (res) {
        if (!res.success) {
          alert('绑定失败' + (res.msg ? '：' + res.msg : '，请重试'));
          Array.from(regionList.children).forEach(function (c) { c.style.pointerEvents = 'auto'; });
          cardEl.style.opacity = '1';
          return;
        }
        showSuccessModal();
      })
      .catch(function () {
        alert('绑定请求失败，请稍后再试');
        Array.from(regionList.children).forEach(function (c) { c.style.pointerEvents = 'auto'; });
        cardEl.style.opacity = '1';
      });
  }

  function postJson(url, data) {
    return fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    }).then(readJsonResponse);
  }

  function readJsonResponse(response) {
    if (!response.ok) {
      throw new Error('HTTP ' + response.status);
    }
    return response.json();
  }

  function showSuccessModal() {
    const homeHref = 'https://维里奈.com';
    const countdownElement = modal.querySelector('.countdown');
    const redirectButton = modal.querySelector('.redirect-button');
    let countdown = 3;

    modal.classList.add('show');
    setTimeout(() => {
      modal.querySelector('.modal-content').style.transform = 'scale(1)';
      modal.querySelector('.modal-content').style.opacity = '1';
    }, 10);

    function updateCountdown() {
      countdownElement.textContent = `${countdown}秒后自动跳转`;
      if (countdown <= 0) {
        clearInterval(timer);
        window.location.href = homeHref;
      }
      countdown--;
    }
    const timer = setInterval(updateCountdown, 1000);

    redirectButton.addEventListener('click', () => {
      clearInterval(timer);
      window.location.href = homeHref;
    });
    modal.querySelector('.close').addEventListener('click', () => {
      clearInterval(timer);
      window.location.href = homeHref;
    });
  }

  closeBtn.addEventListener('click', closeModal);

  function closeModal() {
    modal.querySelector('.modal-content').style.transform = 'scale(0.8)';
    setTimeout(() => { modal.classList.remove('show'); }, 300);
  }

  window.addEventListener('click', function (event) {
    if (event.target === modal) { closeModal(); }
  });

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
</script>
</body>
</html>
